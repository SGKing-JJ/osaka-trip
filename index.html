*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans TC','PingFang TC',sans-serif;-webkit-text-size-adjust:100%;}
.app{position:fixed;top:0;left:0;right:0;bottom:0;width:100%;display:flex;flex-direction:column;background:var(--bg);}@media(min-width:520px){.app{width:480px;left:50%;right:auto;transform:translateX(-50%);}}.nav-safe{flex-shrink:0;height:env(safe-area-inset-bottom,0px);background:var(--card);}
/* Header */
.hdr{background:var(--red);color:#fff;padding:12px 14px 9px;flex-shrink:0;box-shadow:0 2px 14px rgba(192,57,43,.45);}@media(display-mode:standalone){.hdr{padding:calc(env(safe-area-inset-top,0px) + 12px) 14px 9px;}}
.hdr1{display:flex;justify-content:space-between;align-items:flex-start;}
.htit{font-size:20px;font-weight:600;letter-spacing:.2px;}
.hsub{font-size:13.5px;opacity:.85;margin-top:3px;}
.hmeta{font-size:11.5px;opacity:.82;line-height:1.65;text-align:right;}
.sbwrap{position:relative;margin-top:7px;display:none;}
.sbwrap input{width:100%;border:none;border-radius:20px;padding:9px 64px 9px 16px;font-size:15px;font-family:inherit;outline:none;background:rgba(255,255,255,.95);color:#1a1a1a;}
.sclear{position:absolute;right:42px;top:8px;background:none;border:none;cursor:pointer;color:#999;font-size:13px;}
.cambtn{position:absolute;right:8px;top:4px;background:rgba(255,255,255,.22);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
/* Content */
.ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;scroll-behavior:smooth;overscroll-behavior:contain;}
/* Nav */
.nav{flex-shrink:0;display:flex;background:var(--card);border-top:0.5px solid var(--border);box-shadow:0 -2px 14px rgba(0,0,0,.08);padding-bottom:0;}@media(display-mode:standalone){.nav{padding-bottom:env(safe-area-inset-bottom,0px);}}
.nb{flex:1;border:none;background:none;padding:6px 1px 4px;cursor:pointer;font-family:inherit;color:var(--muted);line-height:1.2;transition:all .2s;position:relative;display:flex;flex-direction:column;align-items:center;gap:0px;}.nb::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:3px;background:#C0392B;border-radius:0 0 4px 4px;transition:width .25s;}.nb.on::after{width:38px;}
.nb.on{color:var(--red);font-weight:600;}.nb.on i{font-size:22px;color:#C0392B;}.nb-icon{width:40px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:12px;transition:background .2s;}.nb.on .nb-icon{background:rgba(192,57,43,.12);}
.nb i{display:block;font-size:20px;transition:font-size .2s;}
.nb span{font-size:10px;display:block;margin-top:0;letter-spacing:.2px;transition:color .2s;}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.ov.show{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);}
.mdrg{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 0;}
.mtit{font-size:16.5px;font-weight:600;color:var(--text);}
.mclose{background:var(--surface);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.mbody{padding:12px 18px 26px;}
.sep{height:0.5px;background:var(--border);margin:8px 0;}
/* Cards */
.card{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;border:0.5px solid var(--border);box-shadow:0 1px 6px rgba(0,0,0,.05);}
.acard{background:var(--card);border-radius:16px;margin-bottom:10px;border:0.5px solid var(--border);overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.atop{display:flex;align-items:center;gap:5px;flex-wrap:wrap;padding:7px 13px;}
.abody{padding:10px 13px 8px;}
.atit{font-size:17px;font-weight:600;color:var(--text);line-height:1.35;margin-bottom:3px;}
.aaddr{font-size:12.5px;color:var(--muted);margin-bottom:4px;}
.adesc{font-size:13px;color:var(--text);white-space:pre-line;line-height:1.7;background:var(--surface);border-radius:10px;padding:9px 11px;margin-top:6px;}
.aacts{display:flex;gap:6px;padding:8px 13px 11px;flex-wrap:wrap;}
.ab{border:none;border-radius:8px;padding:7px 11px;font-size:12.5px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:3px;background:var(--surface);color:var(--muted);font-family:inherit;min-height:38px;}
.pill{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11.5px;font-weight:600;}
/* Day tabs */
.dtabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;border:0.5px solid var(--border);border-radius:20px;padding:8px 15px;font-size:13.5px;cursor:pointer;font-family:inherit;background:var(--card);color:var(--muted);}
.dtab.on{font-weight:600;color:#fff;}
/* Filter */
.fbrow{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.fb{border:0.5px solid var(--border);border-radius:20px;padding:9px 16px;font-size:14px;cursor:pointer;background:var(--card);color:var(--muted);font-family:inherit;}
/* Checklist */
.chkrow{display:flex;align-items:center;gap:10px;padding:9px 0;cursor:pointer;border-bottom:0.5px solid var(--surface);}
.chkbox{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chkbox.on{background:var(--green);border-color:var(--green);}
/* Toast */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.87);color:#fff;border-radius:22px;padding:10px 22px;font-size:14px;z-index:100;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;}
.top-btn{position:fixed;bottom:76px;right:14px;width:42px;height:42px;border-radius:50%;background:#C0392B;color:#fff;border:none;cursor:pointer;font-size:19px;display:none;align-items:center;justify-content:center;z-index:90;box-shadow:0 3px 14px rgba(192,57,43,.5);}
@media(display-mode:standalone){.top-btn{bottom:calc(env(safe-area-inset-bottom,0px) + 76px);}}@media(display-mode:standalone){.toast{bottom:calc(env(safe-area-inset-bottom,0px) + 76px);}}
/* Form */
.fi{width:100%;padding:12px 14px;border:0.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;background:var(--card);color:var(--text);outline:none;margin-bottom:10px;}
.fl{font-size:13px;color:var(--muted);font-weight:600;margin-bottom:4px;}
/* Progress */
.prog{height:5px;background:var(--surface);border-radius:99px;overflow:hidden;}
.prog-f{height:100%;border-radius:99px;transition:width .4s;}
/* Accordion */
.acc{background:var(--card);border-radius:12px;margin-bottom:6px;border:0.5px solid var(--border);overflow:hidden;}
.accbtn{width:100%;text-align:left;border:none;background:none;padding:15px 16px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
/* Install banner */
.install-banner{display:none;background:linear-gradient(135deg,#C0392B,#7B2D8B);color:#fff;padding:10px 14px;border-radius:12px;margin-bottom:8px;align-items:center;gap:10px;}
.install-banner.show{display:flex;}
</style>

function loadState(){
  try{
    var f=JSON.parse(localStorage.getItem('osaka-favs')||'[]');
    f.forEach(function(id){S.favs.add(id);});
    var d=JSON.parse(localStorage.getItem('osaka-done')||'[]');
    d.forEach(function(id){S.done.add(id);});
    S.memos=JSON.parse(localStorage.getItem('osaka-memos')||'{}');
    S.pack=JSON.parse(localStorage.getItem('osaka-pack')||'{}');
    S.apiKey=localStorage.getItem('osaka-apikey')||'';
    var sr=localStorage.getItem('osaka-sheet-rows');
    if(sr) S.sheetRows=JSON.parse(sr);
    S.sheetUrl=localStorage.getItem('osaka-sheet-url')||'';
    S.sheetSyncTime=localStorage.getItem('osaka-sheet-time')||'';
    S.sheetErr='';
    try{var ex=localStorage.getItem('osaka-expenses');if(ex)S.expenses=JSON.parse(ex);}catch(e){}
    try{var ph=localStorage.getItem('osaka-photos');if(ph)S.photos=JSON.parse(ph);}catch(e){}
    try{var se=localStorage.getItem('osaka-sheet-edits');if(se)S.sheetEdits=JSON.parse(se);}catch(e){}
    try{var sd=localStorage.getItem('osaka-sheet-deleted');if(sd)S.sheetDeleted=JSON.parse(sd);}catch(e){}
    var jest=localStorage.getItem('osaka-jest');
    if(jest)Object.assign(JEST,JSON.parse(jest));
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem('osaka-favs',JSON.stringify([...S.favs]));
    localStorage.setItem('osaka-done',JSON.stringify([...S.done]));
    localStorage.setItem('osaka-memos',JSON.stringify(S.memos));
    localStorage.setItem('osaka-pack',JSON.stringify(S.pack));
    localStorage.setItem('osaka-apikey',S.apiKey);
    if(S.sheetRows) localStorage.setItem('osaka-sheet-rows',JSON.stringify(S.sheetRows));
    if(S.sheetUrl) localStorage.setItem('osaka-sheet-url',S.sheetUrl);

function rFood(){
  var all = [];
  DAYS.forEach(function(d){
    d.acts.forEach(function(a){
      if(a.type==='food'||a.type==='attraction'||a.type==='shopping')
        all.push({a:a, c:d.color, id:d.id, dt:d.date, isSheet:false,
                  loc:'行程內', cat:a.type==='food'?'美食':a.type==='attraction'?'景點':'伴手禮/購物'});
    });
  });
  (S.sheetRows||[]).forEach(function(r,i){
    var sid='sh-'+i;
    if((S.sheetDeleted||[]).indexOf(sid)>=0)return;
    var base={
      id:sid,
      time:r._time||r['時間']||'12:00',
      title:r._title||r['名稱']||r['景點/美食']||r['店名']||'',
      type:r._type||r['分類']||'food',
      meal:r._meal||r['餐別']||null,
      veg:r._veg||(r['素食']||'').toLowerCase()==='是',
      nsf:r._nsf||(r['含魚']||'').toLowerCase()==='是',
      addr:r._addr||r['地址']||'',
      map:r._map||'',
      desc:(function(){
        var parts=[];
        var d=r._desc||r['說明']||r['備注']||r['備註']||r['介紹']||r['內容']||'';
        if(d)parts.push(d);
        var p=r._price||r['費用']||r['價格']||'';
        if(p)parts.push('💴 費用：'+p);
        var n=r['推薦']||r['推薦原因']||r['注意']||r['特色']||'';
        if(n&&n!==d)parts.push('💡 '+n);
        var day=r._day||r['天']||r['日期']||r['行程日']||'';
        if(day)parts.push('📅 '+day);
        if(parts.length===0){
          var skip=['名稱','地址','位置','時間','餐別','素食','含魚','地圖連結','地點分類','區域','城市','分類','title','addr','time','meal','veg','nsf','map','type'];
          Object.keys(r).forEach(function(k){if(!k.startsWith('_')&&r[k]&&r[k].trim()&&skip.indexOf(k)<0)parts.push(k+'：'+r[k]);});
        }
        return parts.join('\n');
      })(),
    };
    if(!base.map&&base.addr)base.map='https://maps.google.com/?q='+encodeURIComponent(base.addr);
    var edit=(S.sheetEdits||{})[sid];
    if(edit)Object.assign(base,edit);
    // 地點
    var loc=r['地點分類']||r['區域']||r['城市']||r['地點']||r['位置']||'';
    if(!loc&&base.addr){
      var areaMap=[['奈良','奈良'],['京都','京都'],['神戶','神戶'],['宇治','宇治'],
        ['大阪市中央區','中央区'],['大阪市浪速','浪速区'],['大阪市阿倍野','阿倍野区'],
        ['大阪市北區','北区'],['大阪市鶴橋','東成区'],['大阪市','大阪市'],['大阪','大阪']];
      for(var ai=0;ai<areaMap.length;ai++){if(base.addr.indexOf(areaMap[ai][1])>=0){loc=areaMap[ai][0];break;}}
    }
    // 分類
    var typeRaw=r['分類']||r['Type']||r['類別']||r._type||'';
    var cat='美食';
    if(/景點|觀光|神社|寺|城|公園|博物館|美術館|展覽/i.test(typeRaw)||/attraction/i.test(typeRaw))cat='景點';
    else if(/伴手禮|購物|商店|藥妝|超市|百貨|土産|お土産/i.test(typeRaw)||/shopping/i.test(typeRaw))cat='伴手禮/購物';
    if(base.title)all.push({a:base,c:'#16A085',id:null,dt:r._day||'試算表',isSheet:true,sheetIdx:i,loc:loc||'其他',cat:cat});
  });

  // 地點列表（去重）
  var locs=['all'];
  all.forEach(function(f){if(f.loc&&locs.indexOf(f.loc)<0)locs.push(f.loc);});
  // 類別列表
  var cats=['all','美食','景點','伴手禮/購物'];

  // 複合篩選
  var filt=all.filter(function(f){
    var okFF = S.ff==='veg'?f.a.veg : S.ff==='nsf'?f.a.nsf : true;
    var okLF = S.lf==='all'||f.loc===S.lf;
    var okTF = S.tf==='all'||f.cat===S.tf;
    return okFF&&okLF&&okTF;
  });

  var sheetCount=(S.sheetRows||[]).filter(function(_,i){return(S.sheetDeleted||[]).indexOf('sh-'+i)<0;}).length;

  // 卡片列表

function rBudget(){
  var pt = PAID.reduce(function(s,p){return s+p.amt;},0);
  var rate = S.jpyRate || 0.22;
  var expenses = S.expenses || [];
  // 消費總計（日圓）
  var totalJpy = expenses.reduce(function(s,e){return s+(e.jpy||0);},0);
  var totalTwd = Math.round(totalJpy * rate);
  // 已付款台幣
  var paidTwd = pt;
  // 整體花費
  var grandTwd = paidTwd + Math.round(totalJpy * rate);

  var out = '';

  // ── 總花費概覽卡片 ──

  out += '<div style="font-size:12px;opacity:.8;margin-bottom:4px">💰 旅遊總花費（5人）</div>';
  out += '<div style="font-size:34px;font-weight:700;letter-spacing:-1px">NT$ '+grandTwd.toLocaleString()+'</div>';
  out += '<div style="font-size:13px;opacity:.8;margin-top:4px">每人 NT$ '+Math.round(grandTwd/5).toLocaleString()+'</div>';

  out += '<div style="font-size:11px;opacity:.8">✅ 已付款</div>';
  out += '<div style="font-size:17px;font-weight:600;margin-top:2px">NT$ '+paidTwd.toLocaleString()+'</div></div>';
  out += '<div style="flex:1;background:rgba(255,255,255,.1);border-radius:10px;padding:10px">';
  out += '<div style="font-size:11px;opacity:.8">🧾 現場消費</div>';
  out += '<div style="font-size:17px;font-weight:600;margin-top:2px">¥'+totalJpy.toLocaleString()+'</div>';
  out += '<div style="font-size:11px;opacity:.7">≈NT$ '+totalTwd.toLocaleString()+'</div></div>';
  out += '</div></div>';

  // ── 匯率設定 ──

  out += '<div style="display:flex;align-items:center;gap:8px">';
  out += '<span style="font-size:13px;color:var(--muted)">¥100 = NT$</span>';
  out += '<input type="number" value="'+Math.round(rate*100)+'" min="15" max="35" ';
  out += 'style="width:55px;border:0.5px solid var(--border);border-radius:8px;padding:6px 8px;font-size:14px;font-weight:600;background:var(--card);color:var(--text);text-align:center;outline:none" ';
  out += 'oninput="S.jpyRate=parseInt(this.value)/100;saveState();render()">';
  out += '</div></div></div>';

  // ── 已付款項目 ──
  out += '<div class="card" style="margin-bottom:10px">';
  out += '<div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:10px">✅ 出發前已付款</div>';
  PAID.forEach(function(p){
    out += '<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border)">';
    out += '<div><div style="font-size:13.5px;font-weight:500;color:var(--text)">'+p.label+'</div>';
    out += '<div style="font-size:11.5px;color:var(--muted)">'+p.note+'</div></div>';
    out += '<div style="text-align:right"><div style="font-size:15px;font-weight:600;color:#27AE60">'+p.unit+' '+p.amt.toLocaleString()+'</div>';
    out += '<div style="font-size:11px;color:var(--muted)">每人 '+p.unit+' '+Math.round(p.amt/5).toLocaleString()+'</div></div>';
    out += '</div>';
  });
  out += '<div style="display:flex;justify-content:flex-end;margin-top:8px;padding-top:8px;border-top:0.5px solid var(--border)">';
  out += '<div style="font-size:14px;font-weight:600;color:#27AE60">合計 NT$ '+pt.toLocaleString()+'</div></div>';

  out += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">';
  out += '<div style="font-size:14px;font-weight:600;color:var(--text)">🧾 現場消費記錄</div>';
  out += '<div style="display:flex;gap:6px">';
  out += '<button onclick="openCam()" style="border:none;border-radius:8px;padding:7px 11px;background:#C0392B;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">📷 掃發票</button>';
  out += '<button onclick="openAddExpense()" style="border:0.5px solid var(--border);border-radius:8px;padding:7px 11px;background:none;color:var(--muted);font-size:12px;cursor:pointer;font-family:inherit">＋ 手動新增</button>';
  out += '</div></div>';

    out += '<div style="text-align:center;padding:20px;color:var(--muted)">';

    out += '<div style="font-size:14px;font-weight:600;color:var(--text)">現場消費合計</div>';
    out += '<div style="text-align:right"><div style="font-size:18px;font-weight:700;color:#C0392B">¥'+totalJpy.toLocaleString()+'</div>';
    out += '<div style="font-size:13px;color:#E67E22;font-weight:600">≈ NT$ '+totalTwd.toLocaleString()+'</div></div>';

window.openDetail=function(actId){
  var r=findAct(actId);
  if(!r&&typeof actId==='string'&&actId.indexOf('sh-')===0){
    var idx=parseInt(actId.replace('sh-',''));
    if(!isNaN(idx)&&S.sheetRows&&S.sheetRows[idx]){
      var sr=S.sheetRows[idx];
      var t=sr._title||sr['名稱']||sr['景點/美食']||sr.title||'';
      var ad=sr._addr||sr['地址']||sr.addr||'';
      var lines=[];
      if(sr._desc)lines.push(sr._desc);
      if(sr._price)lines.push('💴 費用：'+sr._price);
      if(sr._day)lines.push('📅 行程日：'+sr._day);
      var skip=['名稱','地址','說明','備注','備註','費用','時間','餐別','素食','含魚','title','addr','desc','time','meal','veg','nsf','price','map','day','type','note'];
      Object.keys(sr).forEach(function(k){if(!k.startsWith('_')&&sr[k]&&skip.indexOf(k)<0)lines.push(k+'：'+sr[k]);});
      var sa={id:actId,time:sr._time||'12:00',title:t,type:sr._type||'food',meal:sr._meal||null,veg:!!sr._veg,nsf:!!sr._nsf,addr:ad,map:sr._map||(ad?'https://maps.google.com/?q='+encodeURIComponent(ad):''),desc:lines.join('\n')};
      S.aiT='';S.aiL=false;window._da=sa;showModal(detHTML(sa));return;
    }
  }
  if(!r)return;
  S.aiT='';S.aiL=false;window._da=r.act;showModal(detHTML(r.act));
};

window.loadAI=async function(actId){
  var found=findAct(actId);
  var act=found?found.act:window._da;
  if(!act)return;
  var key=S.apiKey||localStorage.getItem('osaka-apikey')||'';
  if(!key){
    S.aiT='__NEED_KEY__';S.aiL=false;
    if(window._da)showModal(detHTML(window._da));
    return;
  }
  S.aiL=true;S.aiT='';if(window._da)showModal(detHTML(window._da));
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,
        messages:[{role:'user',content:'請用繁體中文詳細介紹「'+act.title+'」（地址：'+act.addr+'）。格式：\n📖 簡介（3~4句）\n⏰ 實用資訊\n• 開放時間：\n• 費用：\n• 交通：\n💡 旅遊貼士（3點）\n🍽️ 附近美食推薦（2~3個）'}]})});
    var data=await res.json();
    if(data.error){S.aiT='__KEY_ERROR__:'+(data.error.message||'Key 無效');}
    else{S.aiT=data.content&&data.content.map(function(c){return c.text||'';}).join('')||'';}
  }catch(e){S.aiT='__NET_ERROR__';}
  S.aiL=false;if(window._da)showModal(detHTML(window._da));
};

window.saveAct=function(dayId,isAdd){
  var act=window._ea;if(!act.title.trim()){showToast('⚠️ 請輸入標題！');return;}
  // 試算表項目走 saveSheetEdit
  if(window._eaIsSheet){ window._eaIsSheet=false; saveSheetEdit(); return; }
  DAYS.forEach(function(d){if(d.id===dayId||d.id===parseInt(dayId)){
    if(isAdd){d.acts.push(act);d.acts.sort(function(a,b){return a.time.localeCompare(b.time);});}

  }});

// 本地翻譯輔助字典（日文常見詞→繁體中文）
var JPN2ZH = {
  '合計':'合計','小計':'小計','消費税':'消費稅','内税':'含稅','割引':'折扣',
  'クーポン':'優惠券','ポイント':'點數','お釣り':'找零','領収書':'收據',
  'レシート':'收據','免税':'免稅','税込':'含稅','税抜':'未含稅',
  '食品':'食品','飲料':'飲料','菓子':'點心','弁当':'便當','惣菜':'熟食',
  '薬':'藥品','化粧品':'化妝品','洗剤':'洗潔劑','日用品':'日用品',
  '文具':'文具','衣料':'服裝','靴':'鞋子','鞄':'包包','傘':'雨傘',
  '電池':'電池','充電器':'充電器','ケーブル':'線材','スマホ':'手機',
  '牛乳':'牛奶','卵':'雞蛋','パン':'麵包','肉':'肉類','魚':'魚類',
  '野菜':'蔬菜','果物':'水果','米':'米','麺':'麵條','豆腐':'豆腐',
  '醤油':'醬油','味噌':'味噌','塩':'鹽','砂糖':'砂糖','油':'食用油',
  '水':'水','茶':'茶','コーヒー':'咖啡','ジュース':'果汁','ビール':'啤酒',
  'アイス':'冰淇淋','チョコ':'巧克力','クッキー':'餅乾','ケーキ':'蛋糕',
  'お土産':'伴手禮','限定':'限定','新発売':'新品','セール':'特賣',
  '個':'個','本':'支/瓶','袋':'袋','箱':'盒','枚':'張','冊':'本',
};
function localTranslate(text, direction){
  if(!text) return text;
  if(direction==='jpn2zh'){
    // 日→繁中：查字典替換
    var result = text;
    Object.keys(JPN2ZH).forEach(function(k){
      result = result.replace(new RegExp(k,'g'), JPN2ZH[k]);
    });
    return result;
  }
  // 其他方向：直接顯示原文+說明
  return text;
}

window.handleCam=async function(input){
  var file=input.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=async function(ev){
    S.camImg=ev.target.result;
    S.camL=true; S.camT=''; S.receiptData=null;
    showModal(camHTML());
    var mode=S.camMode||'receipt';
    var tm=S.translateMode||'jpn2zh';
    if(typeof Tesseract==='undefined'){
      S.camL=false; S.camT='⚠️ OCR 模組載入中，請稍候再試'; showModal(camHTML()); return;
    }
    function updateProgress(p,msg){
      var bar=document.getElementById('ocrBar');
      var txt=document.getElementById('ocrProgress');
      if(bar) bar.style.width=Math.round(p*100)+'%';
      if(txt) txt.textContent=msg||'辨識中…';
    }
    try{
      // Canvas 前處理：灰階 + 對比增強
      var processedImg=await new Promise(function(resolve){
        var img=new Image();
        img.onload=function(){
          var canvas=document.createElement('canvas');
          var scale=Math.max(1,Math.min(3,2000/Math.max(img.width,img.height)));
          canvas.width=img.width*scale; canvas.height=img.height*scale;
          var ctx=canvas.getContext('2d');
          ctx.drawImage(img,0,0,canvas.width,canvas.height);
          var id=ctx.getImageData(0,0,canvas.width,canvas.height),d=id.data;
          for(var i=0;i<d.length;i+=4){
            var g=0.299*d[i]+0.587*d[i+1]+0.114*d[i+2];
            g=g<128?Math.max(0,g*0.5):Math.min(255,g*1.2);
            d[i]=d[i+1]=d[i+2]=g; d[i+3]=255;
          }
          ctx.putImageData(id,0,0);
          resolve(canvas.toDataURL('image/png'));
        };
        img.src=ev.target.result;
      });

      // 語言設定
      var translatePairs={
        jpn2zh:{src:'jpn'},zh2jpn:{src:'chi_tra'},
        eng2jpn:{src:'eng'},jpn2eng:{src:'jpn'},
        zh2eng:{src:'chi_tra'},eng2zh:{src:'eng'}
      };
      var srcLang = mode==='translate'
        ? (translatePairs[tm]&&translatePairs[tm].src||'jpn')
        : (mode==='receipt'?'jpn+eng':'jpn+chi_tra+eng');

      updateProgress(0.05,'初始化…');
      var result=await Tesseract.recognize(processedImg, srcLang, {
        logger:function(m){
          if(m.status==='loading language traineddata') updateProgress(0.1,'載入語言包（首次約需30秒）…');
          else if(m.status==='recognizing text') updateProgress(0.2+m.progress*0.75,'辨識文字 '+Math.round(m.progress*100)+'%');
        }
      });
      var rawText=(result.data.text||'').trim();

      if(mode==='translate'){
        // 翻譯模式
        var translated='';
        if(tm==='jpn2zh'){
          translated=localTranslate(rawText,'jpn2zh');
          // 格式化：原文 + 翻譯
          S.camT='【原文】\n'+rawText+'\n\n【繁體中文翻譯】\n'+translated;
        } else {
          // 其他方向先顯示辨識結果 + 提示
          var dirLabel={zh2jpn:'繁體中文→日文',eng2jpn:'英文→日文',jpn2eng:'日文→英文',zh2eng:'繁體中文→英文',eng2zh:'英文→繁體中文'}[tm]||tm;
          S.camT='【辨識文字】\n'+rawText+'\n\n⚠️ '+dirLabel+' 翻譯需要網路，請複製上方文字後使用 Google 翻譯。';
        }
      } else if(mode==='receipt'){
        // 發票模式
        var lines2=rawText.split('\n').filter(function(l){return l.trim().length>0;});
        var items=[],discounts=[],total=0,tax=0;
        var totalKW=/合計|小計|お支払|お買上|Total|TOTAL/i;
        var taxKW=/消費税|税額|Tax/i;
        var discKW=/割引|クーポン|ポイント|値引|OFF/i;
        lines2.forEach(function(line){
          var cl=line.trim(); if(cl.length<2) return;
          var nums=[],reg=/[¥￥]?\s*(\d{1,3}(?:[,，]\d{3})*|\d{2,6})/g,mm;
          while((mm=reg.exec(cl))!==null){
            var n=parseInt(mm[1].replace(/[,，]/g,''));
            if(n>=10&&n<=500000) nums.push(n);
          }
          if(nums.length===0) return;
          var amt=nums[nums.length-1];
          if(totalKW.test(cl)){if(amt>total)total=amt;}
          else if(taxKW.test(cl)){tax=amt;}
          else if(discKW.test(cl)){
            var dn=cl.replace(/[¥￥\d,，\s]/g,'').trim().slice(0,15)||'折扣';
            discounts.push({name:dn,jpy:amt});
          } else {
            var nm=cl.replace(/[¥￥]/g,'').replace(/\s*\d{1,3}(?:[,，]\d{3})*\s*/g,' ').replace(/\s+/g,' ').trim();
            if(!nm) nm='商品'; if(nm.length>25) nm=nm.slice(0,25);
            items.push({name:localTranslate(nm,'jpn2zh'),jpy:amt});
          }
        });
        if(total===0&&items.length>0){
          var s2=items.reduce(function(a,i){return a+i.jpy;},0);
          var d2=discounts.reduce(function(a,d){return a+d.jpy;},0);
          total=s2-d2;
        }
        if(items.length>30) items=items.slice(0,30);
        if(items.length>0||total>0){
          S.receiptData={items:items,discounts:discounts,total:total,tax:tax};
          S.camT='__RECEIPT_OK__';
        } else {
          S.camT='⚠️ 未能辨識金額，請確認發票清晰\n\n原始文字：\n'+rawText.slice(0,500);
        }
      } else {
        S.camT=rawText||'未辨識到文字，請重新拍攝';
      }
    }catch(e2){
      S.camT='⚠️ 辨識失敗：'+e2.message;
    }
    S.camL=false; showModal(camHTML());
  };
  reader.readAsDataURL(file);
};

window.delSheetItem = function(sid){
  if(!confirm('確定刪除此筆試算表資料？\n（只影響 APP 顯示，不影響試算表本身）')) return;
  if(!S.sheetDeleted) S.sheetDeleted = [];

  saveState(); render(); showToast('✅ 已刪除（試算表本身不受影響）');
};

window.openSheetEdit = function(sid, idx){
  var base = {};
  if(S.sheetRows && S.sheetRows[idx]){
    var r = S.sheetRows[idx];
    base = {
      id: sid, time: r._time||r['時間']||'12:00',
      title: r._title||r['名稱']||r['景點/美食']||r['店名']||'',
      type: r._type||'food', meal: r._meal||r['餐別']||null,
      veg: r._veg||(r['素食']||'').toLowerCase()==='是',
      nsf: r._nsf||(r['含魚']||'').toLowerCase()==='是',
      addr: r._addr||r['地址']||'',
      map: r._map||'',
      desc: (function(){
        var parts = [];
        // 優先顯示已知說明欄位
        var d = r._desc||r['說明']||r['備注']||r['備註']||r['介紹']||r['內容']||r['description']||'';
        if(d) parts.push(d);
        // 費用
        var p = r._price||r['費用']||r['價格']||r['price']||'';
        if(p) parts.push('💴 費用：'+p);
        // 推薦/備注
        var n = r['推薦']||r['推薦原因']||r['注意']||r['特色']||'';
        if(n && n!==d) parts.push('💡 '+n);
        // 行程日
        var day = r._day||r['天']||r['日期']||r['Day']||r['行程日']||'';
        if(day) parts.push('📅 行程日：'+day);
        // 若都沒資料，把所有非空白欄位列出
        if(parts.length===0){
          var skip=['名稱','地址','位置','時間','餐別','素食','含魚','地圖連結','Maps','title','addr','time','meal','veg','nsf','map','type'];
          Object.keys(r).forEach(function(k){
            if(!k.startsWith('_') && r[k] && r[k].trim() && skip.indexOf(k)<0){
              parts.push(k+'：'+r[k]);
            }
          });
        }
        return parts.join('\n');
      })(),
    };
  }
  // 套用已有的本地編輯
  var edit = (S.sheetEdits||{})[sid];
  if(edit) Object.assign(base, edit);
  window._ea = Object.assign({}, base);
  window._eaIsSheet = true;
  window._eaSheetId = sid;
  showModal(editHTML(window._ea, false, null));
};

window.saveSheetEdit = function(){
  var act = window._ea;
  if(!act.title.trim()){ showToast('⚠️ 請輸入標題！'); return; }
  if(!S.sheetEdits) S.sheetEdits = {};

window.handlePhotoUpload = function(actId, input){
  var file = input.files[0];
  if(!file) return;
  var reader = new FileReader();
  reader.onload = function(ev){
    // 壓縮圖片（最大 800px，品質 0.75）
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      var maxW = 800, maxH = 800;
      var w = img.width, h = img.height;
      if(w > maxW){ h = h*(maxW/w); w = maxW; }
      if(h > maxH){ w = w*(maxH/h); h = maxH; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      S.photos[actId] = canvas.toDataURL('image/jpeg', 0.75);
      saveState(); closeModal(); render();
      showToast('✅ 相片已加入！');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

window.deletePhoto = function(actId){
  if(!confirm('確定刪除此相片？')) return;
  delete S.photos[actId];
  saveState(); closeModal(); render(); showToast('✅ 相片已刪除');

window.handleFileImport = function(input){
  var file = input.files[0];
  if(!file){ showToast('⚠️ 請選擇檔案'); return; }
  var name = file.name.toLowerCase();
  var reader = new FileReader();

  // CSV 檔案
  if(name.endsWith('.csv')){
    reader.onload = function(ev){
      try{
        var rows = parseCSV(ev.target.result);
        processImportedRows(rows, file.name);
      }catch(e){
        showToast('❌ CSV 解析失敗：'+e.message);
      }
    };
    reader.readAsText(file, 'UTF-8');
  }
  // Excel 檔案（需 SheetJS）
  else if(name.endsWith('.xlsx')||name.endsWith('.xls')){
    reader.onload = function(ev){
      try{
        if(typeof XLSX === 'undefined'){
          showToast('❌ Excel 讀取模組載入中，請稍後再試');
          return;
        }
        var data = new Uint8Array(ev.target.result);
        var wb = XLSX.read(data, {type:'array'});
        // 取第一個工作表
        var wsName = wb.SheetNames[0];
        var ws = wb.Sheets[wsName];
        // 轉為 JSON（含標題列）
        var json = XLSX.utils.sheet_to_json(ws, {defval:''});
        if(json.length === 0){
          // 嘗試取得標題
          var csv = XLSX.utils.sheet_to_csv(ws);
          var rows2 = parseCSV(csv);
          processImportedRows(rows2, file.name);
        } else {
          // json 格式：每行是 {欄位名:值} 的物件
          processImportedJSON(json, file.name);
        }
      }catch(e){
        console.error('Excel error:', e);
        showToast('❌ Excel 讀取失敗：'+e.message);
      }
    };
    reader.readAsArrayBuffer(file);
  } else {
    showToast('⚠️ 請選擇 .xlsx、.xls 或 .csv 檔案');
  }
  // 重置 input 讓同一檔案可重複選
  input.value = '';
};

// 處理從 JSON（SheetJS sheet_to_json）匯入的資料
window.processImportedJSON = function(json, filename){
  if(!json||json.length===0){ showToast('⚠️ 檔案內容為空'); return; }
  S.sheetRows = json.map(function(r){
    // 統一映射欄位
    r._title = r['名稱']||r['景點/美食']||r['店名']||r['地點']||r.title||'';
    r._addr  = r['地址']||r['位置']||r.addr||'';
    r._desc  = r['說明']||r['備注']||r['備註']||r['介紹']||r['內容']||r.desc||'';
    r._time  = r['時間']||r['建議時間']||r.time||'';
    r._meal  = r['餐別']||r['類別']||r.meal||'';
    r._veg   = (r['素食']||r.veg||'').toString().toLowerCase()==='是'||r.veg===true;
    r._nsf   = (r['含魚']||r.nsf||'').toString().toLowerCase()==='是'||r.nsf===true;
    r._price = r['費用']||r['價格']||r.price||'';
    r._day   = r['天']||r['日期']||r['Day']||r['行程日']||r.day||'';
    r._type  = r['分類']||r['Type']||r.type||'food';
    r._map   = r['地圖連結']||r['Maps']||r.map||(r._addr?'https://maps.google.com/?q='+encodeURIComponent(r._addr):'');
    r._note  = r['注意']||r['推薦']||r['特色']||r.note||'';
    return r;
  }).filter(function(r){ return r._title; }); // 過濾沒有標題的行
  S.sheetSyncTime = new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})+'（'+filename+'）';
  S.sheetEdits = {}; S.sheetDeleted = [];
  saveState(); closeModal(); render();
  showToast('✅ 成功匯入 '+S.sheetRows.length+' 筆（'+filename+'）');
};

// 處理從 CSV rows 陣列匯入的資料
window.processImportedRows = function(rows, filename){
  if(!rows||rows.length<2){ showToast('⚠️ 檔案內容為空或格式錯誤'); return; }
  var headers = rows[0].map(function(h){ return h.trim(); });
  var json = rows.slice(1).filter(function(r){ return r.some(function(c){ return c.trim(); }); }).map(function(r){
    var obj = {};
    headers.forEach(function(h,i){ obj[h] = (r[i]||'').trim(); });
    return obj;
  });
  processImportedJSON(json, filename);
};

window.importSheet = async function(){
  var inputUrl = S.sheetUrl || (document.getElementById('sheetUrl')||{}).value || SHEET_CSV_URL;
  var sheetId = null;
  var idMatch = inputUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if(idMatch) sheetId = idMatch[1];

  // 建立多重嘗試 URL（含 CORS proxy 備援）
  var tryUrls = [];
  if(sheetId){
    var directGviz   = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/gviz/tq?tqx=out:csv';
    var directExport = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/export?format=csv&id='+sheetId;
    var directPub    = 'https://docs.google.com/spreadsheets/d/'+sheetId+'/pub?output=csv';
    // CORS proxy 備援（解決 GitHub Pages 跨域問題）
    var proxy1 = 'https://corsproxy.io/?url='+encodeURIComponent(directGviz);
    var proxy2 = 'https://api.allorigins.win/raw?url='+encodeURIComponent(directGviz);
    var proxy3 = 'https://corsproxy.io/?url='+encodeURIComponent(directExport);
    tryUrls = [directGviz, directExport, directPub, proxy1, proxy2, proxy3];
  } else {
    tryUrls = [inputUrl];
  }

  S.sheetErr = '';
  showToast('⏳ 連線中…');

  var csv = null, lastErr = '';
  for(var ti=0; ti<tryUrls.length; ti++){
    var tryUrl = tryUrls[ti];
    try{
      var res = await fetch(tryUrl, {
        method: 'GET',
        mode: 'cors',
        credentials: 'omit',
        cache: 'no-store'
      });
      if(!res.ok){ lastErr='HTTP '+res.status; continue; }
      var text = await res.text();
      if(!text||text.trim().length<5){ lastErr='回應為空'; continue; }
      if(text.trim().startsWith('<!DOCTYPE')||text.trim().startsWith('<html')){
        lastErr='需要登入或無存取權'; continue;
      }
      csv = text;
      S.sheetUrl = tryUrl;
      break;
    }catch(e2){ lastErr=e2.message||'連線失敗'; continue; }
  }

  if(!csv){
    S.sheetErr = '❌ 無法連線（'+lastErr+'）';
    saveState(); render(); showToast('❌ 連線失敗'); return;
  }

  try{
    var rows = parseCSV(csv);
    if(rows.length < 2) throw new Error('試算表內容為空');
    var headers = rows[0].map(function(h){ return h.trim(); });
    S.sheetRows = rows.slice(1)
      .filter(function(r){ return r.some(function(c){ return c.trim(); }); })
      .map(function(r){
        var obj = {};
        headers.forEach(function(h,i){ obj[h] = (r[i]||'').trim(); });
        obj._title = obj['名稱']||obj['景點/美食']||obj['店名']||obj['地點']||obj.title||'';
        obj._addr  = obj['地址']||obj['位置']||obj.addr||'';
        obj._desc  = obj['說明']||obj['備注']||obj['備註']||obj['介紹']||obj['內容']||obj.desc||'';
        obj._time  = obj['時間']||obj['建議時間']||obj.time||'';
        obj._meal  = obj['餐別']||obj['類別']||obj.meal||'';
        obj._veg   = (obj['素食']||obj.veg||'').toLowerCase()==='是'||obj.veg===true;
        obj._nsf   = (obj['含魚']||obj.nsf||'').toLowerCase()==='是'||obj.nsf===true;
        obj._price = obj['費用']||obj['價格']||obj.price||'';
        obj._day   = obj['天']||obj['日期']||obj['Day']||obj['行程日']||obj.day||'';
        obj._type  = obj['分類']||obj['Type']||obj.type||'food';
        obj._map   = obj['地圖連結']||obj['Maps']||obj.map||(obj._addr?'https://maps.google.com/?q='+encodeURIComponent(obj._addr):'');
        obj._note  = obj['注意']||obj['推薦']||obj['特色']||obj.note||'';
        return obj;
      });
    S.sheetSyncTime = new Date().toLocaleString('zh-TW',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'});
    S.sheetEdits = {}; S.sheetDeleted = [];
    saveState(); render();
    showToast('✅ 匯入 '+S.sheetRows.length+' 筆！');
  }catch(parseErr){
    S.sheetErr = '解析失敗：'+parseErr.message;
    saveState(); render(); showToast('❌ '+S.sheetErr);
  }
};
function parseCSV(text){
  var rows=[], row=[], cur='', inQ=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(inQ){if(c==='"'&&text[i+1]==='"'){cur+='"';i++;}else if(c==='"'){inQ=false;}else cur+=c;}
    else if(c==='"'){inQ=true;}
    else if(c===','){row.push(cur);cur='';}
    else if(c==='\n'||c==='\r'){
      row.push(cur);cur='';
      if(row.some(function(x){return x.trim();}))rows.push(row);
      row=[];
      if(c==='\r'&&text[i+1]==='\n')i++;
    }else cur+=c;
  }
  if(cur||row.length)row.push(cur);
  if(row.some(function(x){return x.trim();}))rows.push(row);
  return rows;
}
