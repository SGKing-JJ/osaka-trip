html,body{height:100%;height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'Hiragino Sans','Noto Sans TC','PingFang TC',sans-serif;-webkit-text-size-adjust:100%;}

.htit{font-size:20px;font-weight:600;letter-spacing:.2px;}

.hmeta{font-size:11.5px;opacity:.82;line-height:1.65;text-align:right;}
.sbwrap{position:relative;margin-top:7px;display:none;}
.sbwrap input{width:100%;border:none;border-radius:20px;padding:9px 64px 9px 16px;font-size:15px;font-family:inherit;outline:none;background:rgba(255,255,255,.95);color:#1a1a1a;}

.cambtn{position:absolute;right:8px;top:4px;background:rgba(255,255,255,.22);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;color:#fff;font-size:16px;display:flex;align-items:center;justify-content:center;}
/* Content */
.ct{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px;scroll-behavior:smooth;overscroll-behavior:contain;}
/* Nav */
.nav{flex-shrink:0;display:flex;background:var(--card);border-top:0.5px solid var(--border);box-shadow:0 -2px 16px rgba(0,0,0,.1);padding-bottom:6px;}@media(display-mode:standalone){.nav{padding-bottom:env(safe-area-inset-bottom,8px);}}
.nb{flex:1;border:none;background:none;padding:8px 2px 5px;cursor:pointer;font-family:inherit;color:var(--muted);line-height:1.2;transition:all .2s;position:relative;display:flex;flex-direction:column;align-items:center;gap:1px;}.nb::after{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:0;height:3px;background:#C0392B;border-radius:0 0 4px 4px;transition:width .25s;}.nb.on::after{width:38px;}
.nb.on{color:var(--red);font-weight:600;}.nb.on i{font-size:24px;color:#C0392B;}.nb-icon{width:44px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:14px;transition:background .2s;}.nb.on .nb-icon{background:rgba(192,57,43,.12);}
.nb i{display:block;font-size:22px;transition:font-size .2s;}
.nb span{font-size:10px;display:block;margin-top:1px;letter-spacing:.2px;transition:color .2s;}

.ov{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.ov.show{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:env(safe-area-inset-bottom,0px);}
.mdrg{width:40px;height:4px;background:var(--border);border-radius:2px;margin:12px auto 0;}
.mhdr{display:flex;justify-content:space-between;align-items:center;padding:10px 16px 0;}
.mtit{font-size:16.5px;font-weight:600;color:var(--text);}
.mclose{background:var(--surface);border:none;border-radius:50%;width:34px;height:34px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--muted);}
.mbody{padding:12px 18px 26px;}
.sep{height:0.5px;background:var(--border);margin:8px 0;}

.pill{display:inline-block;padding:3px 8px;border-radius:8px;font-size:11.5px;font-weight:600;}

.dtabs{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;}
.dtabs::-webkit-scrollbar{display:none;}
.dtab{flex-shrink:0;border:0.5px solid var(--border);border-radius:20px;padding:8px 15px;font-size:13.5px;cursor:pointer;font-family:inherit;background:var(--card);color:var(--muted);}
.dtab.on{font-weight:600;color:#fff;}

.fb{border:0.5px solid var(--border);border-radius:20px;padding:9px 16px;font-size:14px;cursor:pointer;background:var(--card);color:var(--muted);font-family:inherit;}

.chkbox{width:24px;height:24px;border-radius:6px;border:1.5px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.chkbox.on{background:var(--green);border-color:var(--green);}

.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.87);color:#fff;border-radius:22px;padding:10px 22px;font-size:14px;z-index:100;white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none;}@media(display-mode:standalone){.toast{bottom:calc(env(safe-area-inset-bottom,0px) + 76px);}}

.fi{width:100%;padding:12px 14px;border:0.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;background:var(--card);color:var(--text);outline:none;margin-bottom:10px;}

/* Progress */
.prog{height:5px;background:var(--surface);border-radius:99px;overflow:hidden;}
.prog-f{height:100%;border-radius:99px;transition:width .4s;}
/* Accordion */
.acc{background:var(--card);border-radius:12px;margin-bottom:6px;border:0.5px solid var(--border);overflow:hidden;}
.accbtn{width:100%;text-align:left;border:none;background:none;padding:15px 16px;cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--text);display:flex;justify-content:space-between;align-items:center;}
/* Install banner */
.install-banner{display:none;background:linear-gradient(135deg,#C0392B,#7B2D8B);color:#fff;padding:10px 14px;border-radius:12px;margin-bottom:8px;align-items:center;gap:10px;}
.install-banner.show{display:flex;}

function loadState(){
  try{
    var f=JSON.parse(localStorage.getItem('osaka-favs')||'[]');
    f.forEach(function(id){S.favs.add(id);});
    var d=JSON.parse(localStorage.getItem('osaka-done')||'[]');
    d.forEach(function(id){S.done.add(id);});
    S.memos=JSON.parse(localStorage.getItem('osaka-memos')||'{}');
    S.pack=JSON.parse(localStorage.getItem('osaka-pack')||'{}');
    S.apiKey=localStorage.getItem('osaka-apikey')||'';
    var jest=localStorage.getItem('osaka-jest');
    if(jest)Object.assign(JEST,JSON.parse(jest));
  }catch(e){}
}
function saveState(){
  try{
    localStorage.setItem('osaka-favs',JSON.stringify([...S.favs]));
    localStorage.setItem('osaka-done',JSON.stringify([...S.done]));
    localStorage.setItem('osaka-memos',JSON.stringify(S.memos));
    localStorage.setItem('osaka-pack',JSON.stringify(S.pack));
    localStorage.setItem('osaka-apikey',S.apiKey);
    localStorage.setItem('osaka-jest',JSON.stringify(JEST));
  }catch(e){}
}

function pill(bg,c,t){return '<span class="pill" style="background:'+bg+';color:'+c+'">'+t+'</span>';}
function pad2(n){return n<10?'0'+n:''+n;}
function findAct(id){var r=null;DAYS.forEach(function(d){d.acts.forEach(function(a){if(a.id===id)r={act:a,day:d};});});return r;}
function showToast(msg){var e=document.getElementById('TE');e.textContent=msg;e.style.opacity='1';clearTimeout(window._tt);window._tt=setTimeout(function(){e.style.opacity='0';},2500);}
function showModal(html){document.getElementById('MI').innerHTML=html;document.getElementById('OV').className='ov show';}

// ═══ NAVIGATION ═══
function gTab(n){
  S.tab=n;S.sq='';
  for(var i=0;i<7;i++)document.getElementById('nb'+i).className='nb'+(i===n?' on':'');
  var sb=document.getElementById('SBW');
  sb.style.display=n===1?'block':'none';
  if(n!==1){var si=document.getElementById('SIN');if(si)si.value='';}
  render();
}

// ═══ RENDER ═══
function render(){
  var c=document.getElementById('CT');
  if(S.tab===0)c.innerHTML=rHome();
  else if(S.tab===1)c.innerHTML=rItin();
  else if(S.tab===2)c.innerHTML=rFood();
  else if(S.tab===3)c.innerHTML=rMap();
  else if(S.tab===4)c.innerHTML=rFavs();
  else if(S.tab===5)c.innerHTML=rBudget();
  else c.innerHTML=rTips();
}

    +'<div style="font-size:13.5px;opacity:.85;margin-top:3px">≈ NT$ '+Math.round(et*0.22).toLocaleString()+' · 每人 ¥'+Math.round(et/5).toLocaleString()+'</div></div>'
    +'<div class="card"><div style="font-size:13px;font-weight:600;margin-bottom:8px">✅ 已付款項目</div>'+pRows+'</div>'

    +'<div style="font-size:13px;font-weight:600">📊 預估費用（可調整）</div>'
    +'<button onclick="openCam()" style="border:0.5px solid var(--border);border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;background:none;color:var(--muted)">📷 拍照辨識</button>'

    +'</div>';
}

function rTips(){
  var acc=TIPS.map(function(g,gi){
    var open=S.tipsOpen===gi;
    var items=open?'<div style="border-top:0.5px solid var(--border);padding:6px 14px 10px">'
      +g.items.map(function(it){return '<div style="padding:6px 0;border-bottom:0.5px solid var(--surface)">'
        +'<div style="font-size:13px;color:var(--muted)">'+it.q+'</div>'
        +'<div style="font-size:15px;color:var(--text);margin-top:2px">'+it.a+'</div></div>';}).join('')+'</div>':'';
    return '<div class="acc"><button class="accbtn" onclick="S.tipsOpen=S.tipsOpen==='+gi+'?null:'+gi+';render()">'
      +'<span>'+g.t+'</span><i class="ti ti-chevron-'+(open?'up':'down')+'" aria-hidden="true" style="font-size:14px"></i></button>'+items+'</div>';
  }).join('');
  var pack=PACK.map(function(pc,pi){
    return '<div style="margin-bottom:12px"><div style="font-size:14px;font-weight:600;color:#C0392B;margin-bottom:6px">'+pc.cat+'</div>'
      +pc.items.map(function(item,ii){var k='p'+pi+'-'+ii,done=S.pack[k];
        return '<div class="chkrow" onclick="S.pack[\''+k+'\']=!S.pack[\''+k+'\'];saveState();render()">'
          +'<div class="chkbox'+(done?' on':'')+'">'+( done?'<i class="ti ti-check" aria-hidden="true" style="font-size:11px;color:#fff"></i>':'')+'</div>'
          +'<span style="font-size:13px;color:'+(done?'var(--muted)':'var(--text)')+';text-decoration:'+(done?'line-through':'none')+'">'+item+'</span></div>';
      }).join('')+'</div>';
  }).join('');
  return acc+'<div class="card" style="margin-top:4px"><div style="font-size:13px;font-weight:600;margin-bottom:10px">🧳 行李打包清單</div>'+pack+'</div>';
}

// ═══ ACT CARD ═══
function actCard(act,dayColor,dayId,isFood,badge){
  var tc=TC[act.type]||TC.info,mc=act.meal?MC[act.meal]:null;
  var isFav=S.favs.has(act.id),isDone=S.done.has(act.id);
  return '<div class="acard" style="opacity:'+(isDone?.6:1)+'">'
    +'<div class="atop" style="background:'+tc.bg+'">'
    +'<span style="font-size:15px">'+tc.icon+'</span>'
    +'<span style="font-size:10.5px;font-weight:600;color:'+tc.tx+'">'+tc.label+'</span>'
    +(mc?pill(mc.bg,mc.c,mc.label):'')
    +(act.veg?pill('#D5F5E3','#1A6B3A','🌿素食'):'')
    +(act.nsf?pill('#D6EAF8','#1A5276','🐟含魚'):'')
    +(badge?pill(dayColor,'#fff',badge):'')
    +(isDone?pill('#E8F5E9','#27AE60','✓完成'):'')
    +'<span style="margin-left:auto;font-size:12.5px;font-weight:600;color:var(--muted);font-family:monospace">'+act.time+'</span></div>'
    +'<div class="abody"><div class="atit">'+act.title+'</div>'
    +(act.addr?'<div class="aaddr"><i class="ti ti-map-pin" aria-hidden="true" style="font-size:11px;vertical-align:-1px"></i> '+act.addr+'</div>':'')
    +'<div class="adesc">'+(act.desc||'').slice(0,130)+((act.desc||'').length>130?'…':'')+'</div></div>'
    +'<div class="aacts">'
    +'<button class="ab" onclick="openDetail(\''+act.id+'\')" style="color:#2980B9"><i class="ti ti-search" aria-hidden="true" style="font-size:11px"></i> 詳細</button>'
    +'<button class="ab" onclick="tFav(\''+act.id+'\')" style="color:'+(isFav?'#C0392B':'var(--muted)')+'"><i class="ti ti-heart'+(isFav?'-filled':'')+'" aria-hidden="true" style="font-size:11px"></i> '+(isFav?'已收藏':'最愛')+'</button>'
    +'<button class="ab" onclick="cpAct(\''+act.id+'\')" style="color:#27AE60"><i class="ti ti-copy" aria-hidden="true" style="font-size:11px"></i> 複製</button>'
    +(dayId?'<button class="ab" onclick="openEdit(\''+act.id+'\','+dayId+')" style="color:#E67E22"><i class="ti ti-edit" aria-hidden="true" style="font-size:11px"></i> 編輯</button>':'')
    +(dayId?'<button class="ab" onclick="tDone(\''+act.id+'\')" style="color:'+(isDone?'#27AE60':'var(--muted)')+'"><i class="ti ti-check" aria-hidden="true" style="font-size:11px"></i> '+(isDone?'完成':'打卡')+'</button>':'')
    +(dayId?'<button class="ab" onclick="delAct(\''+act.id+'\','+dayId+')" style="color:#C0392B"><i class="ti ti-trash" aria-hidden="true" style="font-size:11px"></i> 刪除</button>':'')
    +(act.map?'<a href="'+act.map+'" target="_blank" rel="noopener" class="ab" style="text-decoration:none;color:#2980B9"><i class="ti ti-map" aria-hidden="true" style="font-size:11px"></i> 導航</a>':'')
    +'</div></div>';
}

// ═══ MODALS ═══
function detHTML(act){
  var tc=TC[act.type]||TC.info,mc=act.meal?MC[act.meal]:null,isFav=S.favs.has(act.id);
  return '<div class="mdrg"></div>'
    +'<div class="mhdr"><div class="mtit">📋 行程詳細</div><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="sep"></div><div class="mbody">'
    +'<div style="display:flex;gap:10px;margin-bottom:10px">'
    +'<div style="background:'+tc.bg+';border-radius:10px;padding:10px;font-size:22px;min-width:48px;display:flex;align-items:center;justify-content:center">'+tc.icon+'</div>'
    +'<div style="flex:1"><div style="font-size:17px;font-weight:600;color:var(--text)">'+act.title+'</div>'
    +'<div style="font-size:13px;color:var(--muted);margin-top:2px">'+act.time+' · '+tc.label+'</div></div>'
    +'<button onclick="tFav(\''+act.id+'\');openDetail(\''+act.id+'\')" style="background:none;border:none;cursor:pointer;font-size:24px;padding:0">'+(isFav?'❤️':'🤍')+'</button></div>'
    +(act.addr?'<div style="background:var(--surface);border-radius:9px;padding:8px 11px;font-size:14px;color:var(--muted);margin-bottom:9px"><i class="ti ti-map-pin" aria-hidden="true" style="font-size:12px;vertical-align:-2px"></i> '+act.addr+'</div>':'')
    +'<div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:9px">'
    +(act.veg?pill('#D5F5E3','#1A6B3A','🌿 素食友善'):'')
    +(act.nsf?pill('#D6EAF8','#1A5276','🐟 含魚無海鮮'):'')
    +(mc?pill(mc.bg,mc.c,mc.label):'')+'</div>'
    +'<div style="background:var(--surface);border-radius:11px;padding:12px;font-size:15px;color:var(--text);white-space:pre-line;line-height:1.9;margin-bottom:10px">'+act.desc+'</div>'
    +'<div style="background:var(--surface);border-radius:12px;padding:13px;margin-bottom:10px">'
    +'<div style="font-size:14px;font-weight:600;color:var(--muted);margin-bottom:8px">🤖 AI 詳細介紹</div>'
    +(!S.aiT&&!S.aiL?'<button onclick="loadAI(\''+act.id.replace(/'/g,'\\\'')+'\')" style="background:#8E44AD;color:#fff;border:none;border-radius:9px;padding:10px;font-size:15px;cursor:pointer;width:100%;font-weight:600;font-family:inherit">✨ 取得 AI 詳細介紹</button>':'')
    +(S.aiL?'<div style="text-align:center;padding:14px;font-size:13px;color:#8E44AD">⏳ AI 查詢中…</div>':'')
    +(S.aiT?'<div style="font-size:15px;color:var(--text);white-space:pre-line;line-height:1.9">'+S.aiT+'</div>':'')
    +'</div>'
    +(act.map?'<a href="'+act.map+'" target="_blank" rel="noopener" style="display:block;text-align:center;background:#C0392B;color:#fff;border-radius:11px;padding:12px;font-size:14px;text-decoration:none;font-weight:600;margin-bottom:4px"><i class="ti ti-map" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> 在 Google Maps 開啟導航</a>':'')
    +'</div>';
}
window.openDetail=function(actId){var r=findAct(actId);if(!r)return;S.aiT='';S.aiL=false;window._da=r.act;showModal(detHTML(r.act));};
window.loadAI=async function(actId){
  var r=findAct(actId);if(!r)return;
  var act=r.act;
  if(!S.apiKey){showToast('⚠️ 請先在預算頁輸入 API Key');return;}
  S.aiL=true;S.aiT='';if(window._da)showModal(detHTML(window._da));
  try{
    var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,
        messages:[{role:'user',content:'請用繁體中文介紹「'+act.title+'」（'+act.addr+'）。格式：\n📖 簡介（3句）\n⏰ 實用資訊：開放時間/費用/交通\n💡 旅遊貼士（3點）\n🍽️ 附近美食（2個）'}]})});
    var data=await res.json();
    S.aiT=data.content?.map(function(c){return c.text||'';}).join('')||'無法取得，請確認API Key是否正確。';
  }catch(e){S.aiT='連線失敗，請檢查網路或API Key。';}
  S.aiL=false;if(window._da)showModal(detHTML(window._da));
};

function editHTML(act,isAdd,dayId){
  return '<div class="mdrg"></div>'
    +'<div class="mhdr"><div class="mtit">'+(isAdd?'➕ 新增':'✏️ 編輯')+'</div><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="sep"></div><div class="mbody"><div style="display:flex;flex-direction:column;gap:8px">'
    +'<div><div class="fl">⏰ 時間</div><input class="fi" type="time" value="'+act.time+'" oninput="window._ea.time=this.value"></div>'
    +'<div><div class="fl">📌 標題</div><input class="fi" type="text" value="'+(act.title||'')+'" placeholder="行程標題" oninput="window._ea.title=this.value"></div>'
    +'<div><div class="fl">🏷️ 類型</div><select class="fi" oninput="window._ea.type=this.value">'
    +Object.keys(TC).map(function(k){return '<option value="'+k+'"'+(act.type===k?' selected':'')+'>'+TC[k].icon+' '+TC[k].label+'</option>';}).join('')+'</select></div>'
    +'<div><div class="fl">🍽️ 餐別</div><select class="fi" oninput="window._ea.meal=this.value||null"><option value=""'+((!act.meal)?' selected':'')+'>非餐食</option>'
    +Object.keys(MC).map(function(k){return '<option value="'+k+'"'+(act.meal===k?' selected':'')+'>'+MC[k].label+'</option>';}).join('')+'</select></div>'
    +'<div><div class="fl">📍 地址</div><input class="fi" type="text" value="'+(act.addr||'')+'" placeholder="地址" oninput="window._ea.addr=this.value"></div>'
    +'<div><div class="fl">🗺️ Google Maps URL</div><input class="fi" type="text" value="'+(act.map||'')+'" placeholder="https://maps.google.com/?q=…" oninput="window._ea.map=this.value"></div>'
    +'<div><div class="fl">📝 說明</div><textarea class="fi" rows="4" style="resize:vertical" oninput="window._ea.desc=this.value">'+(act.desc||'')+'</textarea></div>'
    +'<div style="display:flex;gap:16px">'
    +'<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" '+(act.veg?'checked':'')+' onchange="window._ea.veg=this.checked"> 🌿 素食</label>'
    +'<label style="display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer"><input type="checkbox" '+(act.nsf?'checked':'')+' onchange="window._ea.nsf=this.checked"> 🐟 含魚無海鮮</label>'
    +'</div>'
    +'<button onclick="saveAct('+dayId+','+isAdd+')" style="border:none;border-radius:9px;padding:12px;background:#C0392B;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;width:100%">'+(isAdd?'✅ 確認新增':'✅ 儲存變更')+'</button>'
    +'</div></div>';
}
window.openEdit=function(actId,dayId){var r=findAct(actId);if(!r)return;window._ea=Object.assign({},r.act);showModal(editHTML(window._ea,false,dayId));};
window.openAdd=function(dayId){window._ea={id:'new-'+Date.now(),time:'09:00',title:'',type:'attraction',meal:null,veg:false,nsf:false,addr:'',map:'',desc:''};showModal(editHTML(window._ea,true,dayId));};
window.openAddFood=function(){var dayId=DAYS[S.di].id;window._ea={id:'new-'+Date.now(),time:'12:00',title:'',type:'food',meal:'lunch',veg:false,nsf:false,addr:'',map:'',desc:''};showModal(editHTML(window._ea,true,dayId));};
window.saveAct=function(dayId,isAdd){
  var act=window._ea;if(!act.title.trim()){showToast('⚠️ 請輸入標題！');return;}
  DAYS.forEach(function(d){if(d.id===dayId||d.id===parseInt(dayId)){
    if(isAdd){d.acts.push(act);d.acts.sort(function(a,b){return a.time.localeCompare(b.time);});}
    else{var idx=d.acts.findIndex(function(a){return a.id===act.id;});if(idx>=0)d.acts[idx]=act;}
  }});
  closeModal();render();showToast(isAdd?'✅ 新增成功！':'✅ 已儲存！');
};

// Camera
function camHTML(){
  return '<div class="mdrg"></div>'
    +'<div class="mhdr"><div class="mtit">📷 拍照辨識</div><button class="mclose" onclick="closeModal()">✕</button></div>'
    +'<div class="sep"></div><div class="mbody">'
    +(S.camImg?'<div style="margin-bottom:10px"><img src="'+S.camImg+'" style="width:100%;border-radius:9px;max-height:180px;object-fit:contain;background:var(--surface)"></div>':'')
    +'<div style="font-size:14px;color:var(--muted);text-align:center;margin-bottom:12px">拍攝菜單・標示牌・價格標籤<br>自動辨識中文・日文・英文</div>'
    +'<input type="file" id="CAMIN" accept="image/*" capture="environment" style="display:none" onchange="handleCam(this)">'
    +'<button onclick="document.getElementById(\'CAMIN\').click()" style="background:#C0392B;color:#fff;border:none;border-radius:10px;padding:11px 20px;font-size:13.5px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:6px;width:100%"><i class="ti ti-camera" aria-hidden="true" style="font-size:14px;vertical-align:-2px"></i> 開啟相機拍照</button>'
    +'<button onclick="var i=document.getElementById(\'CAMIN\');i.removeAttribute(\'capture\');i.click()" style="border:0.5px solid var(--border);background:none;color:var(--muted);border-radius:10px;padding:9px;font-size:13px;cursor:pointer;font-family:inherit;width:100%;margin-bottom:12px"><i class="ti ti-photo" aria-hidden="true" style="font-size:13px;vertical-align:-2px"></i> 從相簿選取</button>'
    +(S.camL?'<div style="text-align:center;padding:16px;font-size:13px;color:#8E44AD">⏳ AI 辨識中…</div>':'')
    +(S.camT?'<div style="background:var(--surface);border-radius:10px;padding:12px;font-size:13px;white-space:pre-line;line-height:1.8;color:var(--text)">'+S.camT+'</div>'
      +'<button onclick="navigator.clipboard&&navigator.clipboard.writeText(S.camT).then(function(){showToast(\'📋 已複製！\')})" style="width:100%;margin-top:8px;border:0.5px solid var(--border);border-radius:8px;padding:8px;background:none;font-size:12.5px;cursor:pointer;font-family:inherit;color:var(--muted)"><i class="ti ti-copy" aria-hidden="true" style="font-size:12px;vertical-align:-1px"></i> 複製辨識結果</button>'
      +(S.apiKey?'':'<div style="margin-top:8px;font-size:11.5px;color:var(--muted);text-align:center">⚠️ 需在預算頁設定 API Key 才能使用 AI 辨識</div>')
    :'')+'</div>';
}
window.openCam=function(){S.camT='';S.camL=false;S.camImg=null;showModal(camHTML());};
window.handleCam=async function(input){
  var file=input.files[0];if(!file)return;
  if(!S.apiKey){showToast('⚠️ 請先在預算頁輸入 API Key');closeModal();return;}
  var reader=new FileReader();
  reader.onload=async function(ev){
    S.camImg=ev.target.result;
    var b64=ev.target.result.split(',')[1],mime=file.type;
    S.camL=true;S.camT='';showModal(camHTML());
    try{
      var res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':S.apiKey,'anthropic-version':'2023-06-01'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:700,
          messages:[{role:'user',content:[
            {type:'image',source:{type:'base64',media_type:mime,data:b64}},
            {type:'text',text:'請辨識圖片中所有文字（中文/日文/英文），用繁體中文輸出：\n\n📷 辨識文字：\n（原始文字）\n\n🔤 翻譯：\n（繁體中文翻譯）\n\n💴 價格資訊（如有）：\n（¥金額 → 約NT$金額，匯率¥100=NT$22）'}
          ]}]})});
      var data=await res.json();
      S.camT=data.content?.map(function(c){return c.text||'';}).join('')||'無法辨識，請重試。';
    }catch(e){S.camT='辨識失敗，請確認API Key或網路連線。';}
    S.camL=false;showModal(camHTML());
  };
  reader.readAsDataURL(file);
};

// ═══ ACTIONS ═══
window.tFav=function(id){S.favs.has(id)?S.favs.delete(id):S.favs.add(id);saveState();render();showToast(S.favs.has(id)?'❤️ 已加入最愛':'🤍 已移除最愛');};
window.tDone=function(id){S.done.has(id)?S.done.delete(id):S.done.add(id);saveState();render();showToast(S.done.has(id)?'✅ 已標記完成！':'↩️ 已取消完成');};
window.cpAct=function(id){var r=findAct(id);if(!r)return;var a=r.act,t='【'+a.time+'】'+a.title+'\n📍 '+a.addr+'\n\n'+a.desc;if(navigator.clipboard)navigator.clipboard.writeText(t).then(function(){showToast('📋 已複製！');}).catch(function(){showToast('📋 複製完成');});};
window.delAct=function(id,dayId){var r=findAct(id);if(!r||!confirm('確定刪除「'+r.act.title+'」嗎？'))return;DAYS.forEach(function(d){if(d.id===dayId||d.id===parseInt(dayId))d.acts=d.acts.filter(function(a){return a.id!==id;});});render();showToast('✅ 已刪除行程');};
window.doSearch=function(v){S.sq=v;document.getElementById('SCL').style.display=v?'block':'none';render();};
window.clearSearch=function(){S.sq='';document.getElementById('SIN').value='';document.getElementById('SCL').style.display='none';render();};

// ═══ INIT ═══
loadState();

// Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('sw.js').then(function(r){console.log('SW registered:',r.scope);}).catch(function(e){console.log('SW error:',e);});
  });
}

// PWA install prompt
var deferredPrompt=null;
window.addEventListener('beforeinstallprompt',function(e){
  e.preventDefault();deferredPrompt=e;
  var banner=document.getElementById('installBanner');
  if(banner)banner.classList.add('show');
});

// Countdown tick
setInterval(function(){if(S.tab===0)render();},1000);

render();
</script>
